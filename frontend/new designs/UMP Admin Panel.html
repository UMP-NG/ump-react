<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>UMP Admin Panel — Designs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="admin.css">
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="admin-shell.jsx"></script>
<script type="text/babel" src="admin-screens-1.jsx"></script>
<script type="text/babel" src="admin-screens-2.jsx"></script>

<script type="text/babel">
const { useState } = React;

function NavOnly() { return null; } // unused placeholder

function AdminApp({ initial = 'dashboard' }) {
  const [page, setPage] = useState(initial);
  const titleMap = {
    dashboard: ['Admin','Dashboard'],
    users: ['Admin','People','Users'],
    sellers: ['Admin','People','Sellers'],
    providers: ['Admin','People','Service providers'],
    products: ['Admin','Content','Products'],
    orders: ['Admin','Transactions','Orders'],
    payouts: ['Admin','Transactions','Payouts'],
    disputes: ['Admin','Moderation','Disputes'],
    analytics: ['Admin','Platform','Analytics'],
    broadcast: ['Admin','Platform','Notifications'],
    config: ['Admin','Platform','Site configuration'],
    admins: ['Admin','Platform','Admin accounts'],
  };
  return (
    <div className="admin" data-screen-label={'Admin · ' + page}>
      <AdminSide active={page} onNav={setPage} />
      <div className="adm-main">
        <AdminTop crumbs={titleMap[page] || ['Admin']} />
        <div className="adm-body">
          {page === 'dashboard' && <DashboardHome />}
          {page === 'users' && <UsersScreen />}
          {page === 'sellers' && <SellersScreen />}
          {page === 'providers' && <SellersScreen />}
          {page === 'products' && <ProductsScreen />}
          {page === 'orders' && <OrdersScreen />}
          {page === 'payouts' && <PayoutsScreen />}
          {page === 'disputes' && <DisputesScreen />}
          {page === 'analytics' && <AnalyticsScreen />}
          {page === 'broadcast' && <BroadcastScreen />}
          {page === 'config' && <ConfigScreen />}
          {page === 'admins' && <AdminsScreen />}
        </div>
      </div>
    </div>
  );
}

function Root() {
  return (
    <DesignCanvas
      title="UMP — Admin Panel"
      subtitle="Web admin console for marketplace operations · 11 screens · clickable prototype"
    >
      <DCSection id="proto" title="🔵 Live prototype — click sidebar to navigate every screen">
        <DCArtboard id="admin-prototype" label="UMP Admin · live (sidebar links work)" width={1440} height={900}>
          <AdminApp initial="dashboard" />
        </DCArtboard>
      </DCSection>

      <DCSection id="overview" title="Overview">
        <DCArtboard id="dashboard" label="01 · Dashboard — KPIs, trends, queues" width={1440} height={1100}>
          <AdminApp initial="dashboard" />
        </DCArtboard>
      </DCSection>

      <DCSection id="people" title="People — Users · Sellers · Providers">
        <DCArtboard id="users" label="02 · Users — filter by role, status, joined" width={1440} height={900}>
          <AdminApp initial="users" />
        </DCArtboard>
        <DCArtboard id="sellers" label="03 · Sellers — pending verification queue" width={1440} height={900}>
          <AdminApp initial="sellers" />
        </DCArtboard>
        <DCArtboard id="seller-drawer" label="03b · Seller drawer — approve / reject" width={1440} height={900}>
          <div className="admin" data-screen-label="Sellers · drawer">
            <AdminSide active="sellers" />
            <div className="adm-main">
              <AdminTop crumbs={['Admin','People','Sellers']} />
              <div className="adm-body" style={{ position: 'relative' }}>
                <SellersScreen withDrawer />
              </div>
            </div>
          </div>
        </DCArtboard>
      </DCSection>

      <DCSection id="content" title="Content — Products · Categories">
        <DCArtboard id="products" label="04 · Products — moderation table, bulk actions" width={1440} height={900}>
          <AdminApp initial="products" />
        </DCArtboard>
      </DCSection>

      <DCSection id="transactions" title="Transactions — Orders · Payouts">
        <DCArtboard id="orders" label="05 · Orders — pipeline & status filters" width={1440} height={1000}>
          <AdminApp initial="orders" />
        </DCArtboard>
        <DCArtboard id="payouts" label="06 · Payouts — pending withdrawal queue" width={1440} height={1000}>
          <AdminApp initial="payouts" />
        </DCArtboard>
      </DCSection>

      <DCSection id="moderation" title="Moderation — Disputes">
        <DCArtboard id="disputes" label="07 · Disputes — case detail + resolve" width={1440} height={1000}>
          <AdminApp initial="disputes" />
        </DCArtboard>
      </DCSection>

      <DCSection id="platform" title="Platform — Analytics · Notifications · Config · Admins">
        <DCArtboard id="analytics" label="08 · Analytics — GMV, fees, top sellers" width={1440} height={1100}>
          <AdminApp initial="analytics" />
        </DCArtboard>
        <DCArtboard id="broadcast" label="09 · Notifications — compose + preview" width={1440} height={1100}>
          <AdminApp initial="broadcast" />
        </DCArtboard>
        <DCArtboard id="config" label="10 · Site configuration — fees, hero, flags" width={1440} height={1100}>
          <AdminApp initial="config" />
        </DCArtboard>
        <DCArtboard id="admins" label="11 · Admin accounts — team & activity" width={1440} height={900}>
          <AdminApp initial="admins" />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
</script>

</body>
</html>
