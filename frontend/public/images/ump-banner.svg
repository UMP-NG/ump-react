<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1208"/>
      <stop offset="100%" stop-color="#2d1f0e"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="800" height="320" fill="url(#bg)"/>

  <!-- Shopping bag shape -->
  <!-- Bag body -->
  <rect x="60" y="148" width="160" height="128" rx="14" fill="#f97316"/>
  <!-- Bag top handles (two arches) -->
  <path d="M96 148 Q96 100 140 100 Q184 100 184 148" fill="none" stroke="#f97316" stroke-width="18" stroke-linecap="round"/>
  <!-- Cart icon inside the bag (white) -->
  <g transform="translate(140,212)" fill="#ffffff">
    <!-- Cart body -->
    <path d="M-34-22 L-28-22 L-18 12 L22 12 L30-14 L-14-14" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Wheels -->
    <circle cx="-12" cy="20" r="6"/>
    <circle cx="18" cy="20" r="6"/>
  </g>

  <!-- UMP text -->
  <text
    x="290" y="185"
    font-family="'Arial Black','Helvetica Neue',Arial,Impact,sans-serif"
    font-weight="900"
    font-size="108"
    fill="#ffffff"
    dominant-baseline="auto"
    letter-spacing="-3">UMP</text>

  <!-- Subtitle -->
  <text
    x="292" y="225"
    font-family="'Arial','Helvetica Neue',Arial,sans-serif"
    font-weight="400"
    font-size="22"
    fill="#9ca3af"
    dominant-baseline="auto"
    letter-spacing="5">UNIVERSITY MARKETPLACE</text>
</svg>
